<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07090f"/>
      <stop offset="100%" stop-color="#0e131c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(45,212,191,0.20)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(45,212,191,0.06)" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
  </g>

  <!-- Logo K -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="url(#accent)"/>
    <text x="36" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="42" fill="#07090f">K</text>
  </g>

  <text x="172" y="135" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="36" fill="#f8fafc" letter-spacing="-0.5">Kaestria</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="74" fill="#f8fafc" letter-spacing="-2">Senior IT consulting</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="74" fill="url(#accent)" letter-spacing="-2">&amp; AI-native apps.</text>

  <!-- Tagline -->
  <text x="80" y="465" font-family="JetBrains Mono, ui-monospace, monospace" font-weight="500" font-size="22" fill="rgba(45,212,191,0.85)">Seasoned IT meets AI velocity. Shipping from the Indian Ocean.</text>

  <!-- Footer URL -->
  <text x="80" y="565" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20" fill="#94a3b8">By Arthur Mrowiec  ·  kaestria.fr</text>
</svg>
