services:
  kaestria-web:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: kaestria/web:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
