services:
  kaestria-web:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: kaestria/web:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
